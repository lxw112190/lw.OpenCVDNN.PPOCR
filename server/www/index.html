<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenCVDNN PPOCR HTTP OCR</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      color: #1f2933;
      background: #f4f7fb;
    }
    header {
      padding: 18px 24px;
      background: #ffffff;
      border-bottom: 1px solid #d9e2ec;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    h1 {
      font-size: 20px;
      line-height: 1.3;
      margin: 0;
      font-weight: 700;
    }
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 18px;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    input[type=file] {
      background: #fff;
      border: 1px solid #bcccdc;
      border-radius: 6px;
      padding: 8px;
      min-width: 280px;
    }
    button {
      height: 38px;
      padding: 0 16px;
      border: 0;
      border-radius: 6px;
      background: #0b7285;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled {
      background: #9fb3c8;
      cursor: not-allowed;
    }
    .stage {
      background: #fff;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      min-height: 520px;
      padding: 12px;
      overflow: auto;
    }
    .canvas-wrap {
      position: relative;
      display: inline-block;
      line-height: 0;
      max-width: 100%;
    }
    #preview {
      max-width: 100%;
      height: auto;
      display: block;
    }
    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    aside {
      background: #fff;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      padding: 14px;
      min-height: 520px;
    }
    .meta {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 6px 10px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .label { color: #52606d; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f0f4f8;
      border: 1px solid #d9e2ec;
      border-radius: 6px;
      padding: 10px;
      max-height: 430px;
      overflow: auto;
      font-size: 13px;
      line-height: 1.5;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      header { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <h1>OpenCVDNN PPOCR HTTP OCR</h1>
    <div class="toolbar">
      <input id="file" type="file" accept="image/*">
      <button id="run" disabled>识别</button>
    </div>
  </header>
  <main>
    <section class="stage">
      <div class="canvas-wrap">
        <img id="preview" alt="">
        <canvas id="overlay"></canvas>
      </div>
    </section>
    <aside>
      <div class="meta">
        <div class="label">状态</div><div id="status">请选择图片</div>
        <div class="label">耗时</div><div id="elapsed">-</div>
        <div class="label">结果数</div><div id="count">-</div>
      </div>
      <pre id="result"></pre>
    </aside>
  </main>

  <script>
    const fileInput = document.getElementById('file');
    const runButton = document.getElementById('run');
    const preview = document.getElementById('preview');
    const overlay = document.getElementById('overlay');
    const statusEl = document.getElementById('status');
    const elapsedEl = document.getElementById('elapsed');
    const countEl = document.getElementById('count');
    const resultEl = document.getElementById('result');
    let imageBase64 = '';

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      runButton.disabled = true;
      resultEl.textContent = '';
      clearOverlay();
      if (!file) {
        statusEl.textContent = '请选择图片';
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        imageBase64 = reader.result;
        preview.src = imageBase64;
        statusEl.textContent = '图片已加载';
        elapsedEl.textContent = '-';
        countEl.textContent = '-';
        runButton.disabled = false;
      };
      reader.readAsDataURL(file);
    });

    preview.addEventListener('load', resizeOverlay);
    window.addEventListener('resize', () => {
      resizeOverlay();
      const last = overlay.dataset.lastResult;
      if (last) drawBoxes(JSON.parse(last));
    });

    runButton.addEventListener('click', async () => {
      if (!imageBase64) return;
      runButton.disabled = true;
      statusEl.textContent = '识别中...';
      clearOverlay();
      try {
        const response = await fetch('/api/ocr', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imageBase64 })
        });
        const data = await response.json();
        statusEl.textContent = data.code === 0 ? '识别成功' : data.msg;
        elapsedEl.textContent = `${data.elapsed_ms || 0} ms`;
        countEl.textContent = (data.results || []).length;
        resultEl.textContent = JSON.stringify(data, null, 2);
        overlay.dataset.lastResult = JSON.stringify(data.results || []);
        drawBoxes(data.results || []);
      } catch (err) {
        statusEl.textContent = err.message;
      } finally {
        runButton.disabled = false;
      }
    });

    function resizeOverlay() {
      overlay.width = preview.clientWidth;
      overlay.height = preview.clientHeight;
      overlay.style.width = `${preview.clientWidth}px`;
      overlay.style.height = `${preview.clientHeight}px`;
    }

    function clearOverlay() {
      resizeOverlay();
      const ctx = overlay.getContext('2d');
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      overlay.dataset.lastResult = '';
    }

    function drawBoxes(results) {
      resizeOverlay();
      const ctx = overlay.getContext('2d');
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      if (!preview.naturalWidth || !preview.naturalHeight) return;
      const sx = overlay.width / preview.naturalWidth;
      const sy = overlay.height / preview.naturalHeight;
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#e11d48';
      ctx.fillStyle = 'rgba(225, 29, 72, 0.9)';
      ctx.font = '13px Microsoft YaHei, Arial';
      results.forEach((r, i) => {
        const points = [
          [r.x1 * sx, r.y1 * sy],
          [r.x2 * sx, r.y2 * sy],
          [r.x3 * sx, r.y3 * sy],
          [r.x4 * sx, r.y4 * sy]
        ];
        ctx.beginPath();
        ctx.moveTo(points[0][0], points[0][1]);
        points.slice(1).forEach(p => ctx.lineTo(p[0], p[1]));
        ctx.closePath();
        ctx.stroke();
        const label = `${i + 1}. ${r.text || ''}`;
        const x = Math.min(...points.map(p => p[0]));
        const y = Math.max(14, Math.min(...points.map(p => p[1])) - 4);
        ctx.fillText(label, x, y);
      });
    }
  </script>
</body>
</html>
